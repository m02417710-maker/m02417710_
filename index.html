<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>سوقي | متجر إلكتروني عصري</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #f9fafc;
      color: #1e293b;
      line-height: 1.5;
    }

    /* header & navigation */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #facc15;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      background: #334155;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .cart-icon:hover {
      background: #facc15;
      color: #0f172a;
    }

    .cart-count {
      background-color: #ef4444;
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
    }

    /* hero section */
    .hero {
      background: linear-gradient(to left, #eef2ff, #ffffff);
      padding: 3rem 2rem;
      text-align: center;
      border-bottom: 1px solid #e2e8f0;
    }

    .hero h2 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #475569;
    }

    /* products grid */
    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      border-right: 6px solid #facc15;
      padding-right: 1rem;
      margin-bottom: 2rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
      transition: all 0.25s ease;
      border: 1px solid #f1f5f9;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
      border-color: #facc15;
    }

    .product-img {
      background: #f1f5f9;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: #334155;
    }

    .product-info {
      padding: 1.5rem;
    }

    .product-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .product-price {
      color: #facc15;
      font-weight: 800;
      font-size: 1.5rem;
      margin: 0.75rem 0;
    }

    .product-price small {
      font-size: 0.9rem;
      color: #64748b;
    }

    .add-to-cart {
      background: #0f172a;
      color: white;
      border: none;
      width: 100%;
      padding: 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .add-to-cart:hover {
      background: #facc15;
      color: #0f172a;
    }

    /* cart sidebar */
    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    .cart-sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      width: 100%;
      max-width: 450px;
      height: 100%;
      background: white;
      box-shadow: -5px 0 30px rgba(0,0,0,0.2);
      z-index: 201;
      transition: 0.3s ease;
      display: flex;
      flex-direction: column;
      font-family: 'Cairo', sans-serif;
    }

    .cart-sidebar.open {
      left: 0;
    }

    .cart-overlay.open {
      visibility: visible;
      opacity: 1;
    }

    .cart-header {
      padding: 1.5rem;
      border-bottom: 2px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      color: white;
    }

    .cart-header h3 {
      font-size: 1.5rem;
    }

    .close-cart {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: white;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      margin-bottom: 0.75rem;
      padding: 0.8rem;
      border-radius: 20px;
      gap: 10px;
    }

    .cart-item-info h4 {
      font-size: 1rem;
    }

    .cart-item-price {
      color: #facc15;
      font-weight: bold;
    }

    .cart-item-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .cart-item-actions button {
      background: #e2e8f0;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .cart-footer {
      padding: 1.5rem;
      border-top: 2px solid #e2e8f0;
      background: white;
    }

    .total {
      display: flex;
      justify-content: space-between;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .checkout-btn {
      background: #facc15;
      color: #0f172a;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 50px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .empty-cart {
      text-align: center;
      color: #94a3b8;
      padding: 2rem;
    }

    /* checkout modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }

    .modal.open {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 32px;
      padding: 2rem;
      text-align: center;
    }

    .modal-content h3 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .modal-content input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.7rem 0;
      border: 1px solid #cbd5e1;
      border-radius: 30px;
      font-family: 'Cairo', sans-serif;
    }

    .confirm-order {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      margin-top: 1rem;
      cursor: pointer;
      width: 100%;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: #facc15;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 400;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    footer {
      background: #0f172a;
      color: #cbd5e1;
      text-align: center;
      padding: 2rem;
      margin-top: 3rem;
    }

    @media (max-width: 640px) {
      .hero h2 { font-size: 1.6rem; }
      .section-title { font-size: 1.4rem; }
      .products-grid { gap: 1rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="nav-container">
    <div class="logo">
      <h1>سوقي <span>✨</span></h1>
    </div>
    <div class="cart-icon" id="cartIconBtn">
      <i class="fas fa-shopping-cart"></i>
      <span id="cartTotalItems">0</span>
    </div>
  </div>
</header>

<section class="hero">
  <h2>أحدث التشكيلات بأفضل الأسعار</h2>
  <p>تسوق بكل ثقة – جودة عالية وتوصيل سريع</p>
</section>

<div class="container">
  <div class="section-title">🔥 منتجات مميزة</div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<footer>
  <p>© 2025 سوقي – جميع الحقوق محفوظة | تجربة تسوق آمنة</p>
</footer>

<!-- Cart Sidebar -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fas fa-bag-shopping"></i> سلة التسوق</h3>
    <button class="close-cart" id="closeCartBtn">&times;</button>
  </div>
  <div class="cart-items" id="cartItemsContainer">
    <div class="empty-cart">سلة التسوق فارغة 🛒</div>
  </div>
  <div class="cart-footer">
    <div class="total">
      <span>المجموع الكلي:</span>
      <span id="cartTotalPrice">0.00 <small>ج.م</small></span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">إتمام الشراء</button>
  </div>
</div>

<!-- Checkout Modal -->
<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3>💳 إتمام الطلب</h3>
    <p>أدخل بياناتك لتأكيد الشراء</p>
    <input type="text" id="customerName" placeholder="الاسم الكامل" autocomplete="off">
    <input type="tel" id="customerPhone" placeholder="رقم الهاتف">
    <input type="email" id="customerEmail" placeholder="البريد الإلكتروني (اختياري)">
    <button class="confirm-order" id="confirmOrderBtn">تأكيد الطلب 🚀</button>
    <button style="background:#e2e8f0; margin-top: 10px;" id="closeModalBtn">إلغاء</button>
  </div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
  // ----------------------------------------------
  // بيانات المنتجات (محاكاة قاعدة بيانات)
  // ----------------------------------------------
  const productsData = [
    { id: 1, name: "سماعات لاسلكية Pro", price: 450, icon: "🎧", desc: "جودة صوت استثنائية" },
    { id: 2, name: "ساعة ذكية رياضية", price: 950, icon: "⌚", desc: "مراقبة نبضات القلب" },
    { id: 3, name: "حقيبة ظهر عصرية", price: 520, icon: "🎒", desc: "مقاومة للماء" },
    { id: 4, name: "قبعة بيسبول", price: 180, icon: "🧢", desc: "قطن 100%" },
    { id: 5, name: "حذاء رياضي خفيف", price: 1250, icon: "👟", desc: "مريح للجري" },
    { id: 6, name: "سماعة ألعاب RGB", price: 780, icon: "🎮", desc: "ميكروفون عالي الجودة" },
    { id: 7, name: "باور بانك 20000mAh", price: 390, icon: "🔋", desc: "شحن سريع" },
    { id: 8, name: "مصباح مكتبي LED", price: 210, icon: "💡", desc: "إضاءة متغيرة" }
  ];

  // سلة المشتريات (تخزين في localStorage)
  let cart = [];

  // تحميل السلة من localStorage إن وجدت
  function loadCartFromStorage() {
    const stored = localStorage.getItem("ecomCart");
    if (stored) {
      try {
        cart = JSON.parse(stored);
      } catch(e) { cart = []; }
    }
    if (!cart.length) cart = [];
    updateCartUI();
  }

  // حفظ السلة في localStorage
  function saveCartToStorage() {
    localStorage.setItem("ecomCart", JSON.stringify(cart));
  }

  // إضافة منتج إلى السلة
  function addToCart(productId) {
    const product = productsData.find(p => p.id === productId);
    if (!product) return;
    
    const existingItem = cart.find(item => item.id === productId);
    if (existingItem) {
      existingItem.quantity += 1;
    } else {
      cart.push({ ...product, quantity: 1 });
    }
    saveCartToStorage();
    updateCartUI();
    showToast(`✅ تم إضافة "${product.name}" إلى السلة`);
  }

  // تحديث الكمية
  function updateQuantity(productId, delta) {
    const index = cart.findIndex(item => item.id === productId);
    if (index === -1) return;
    const newQty = cart[index].quantity + delta;
    if (newQty <= 0) {
      cart.splice(index, 1);
    } else {
      cart[index].quantity = newQty;
    }
    saveCartToStorage();
    updateCartUI();
  }

  // إزالة العنصر بالكامل
  function removeItem(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCartToStorage();
    updateCartUI();
    showToast("🗑 تم إزالة المنتج من السلة");
  }

  // حساب الإجمالي وعدد القطع
  function getCartTotals() {
    let totalItems = 0;
    let totalPrice = 0;
    for (let item of cart) {
      totalItems += item.quantity;
      totalPrice += item.price * item.quantity;
    }
    return { totalItems, totalPrice };
  }

  // عرض واجهة السلة (القائمة الجانبية + الأيقونة + إجمالي السلة)
  function updateCartUI() {
    const cartItemsContainer = document.getElementById("cartItemsContainer");
    const cartTotalPriceSpan = document.getElementById("cartTotalPrice");
    const cartTotalItemsSpan = document.getElementById("cartTotalItems");
    const { totalItems, totalPrice } = getCartTotals();
    
    cartTotalItemsSpan.innerText = totalItems;
    
    if (cart.length === 0) {
      cartItemsContainer.innerHTML = `<div class="empty-cart">🛍️ سلة التسوق فارغة<br>أضف منتجاتك المفضلة!</div>`;
      cartTotalPriceSpan.innerText = `0.00 ج.م`;
      return;
    }
    
    let html = ``;
    cart.forEach(item => {
      html += `
        <div class="cart-item" data-id="${item.id}">
          <div class="cart-item-info">
            <h4>${item.icon} ${item.name}</h4>
            <span class="cart-item-price">${item.price} ج.م</span>
          </div>
          <div class="cart-item-actions">
            <button class="qty-decr" data-id="${item.id}">-</button>
            <span style="min-width: 28px; text-align: center;">${item.quantity}</span>
            <button class="qty-incr" data-id="${item.id}">+</button>
            <button class="remove-item" data-id="${item.id}" style="background:#fee2e2; color:#b91c1c;"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    });
    cartItemsContainer.innerHTML = html;
    cartTotalPriceSpan.innerText = `${totalPrice.toFixed(2)} ج.م`;
    
    // attach events for dynamic cart buttons (decr, incr, remove)
    document.querySelectorAll('.qty-decr').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        updateQuantity(id, -1);
      });
    });
    document.querySelectorAll('.qty-incr').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        updateQuantity(id, 1);
      });
    });
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        removeItem(id);
      });
    });
  }
  
  // عرض رسالة منبثقة
  function showToast(msg, duration = 2000) {
    const toast = document.getElementById("toastMsg");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => {
      toast.classList.remove("show");
    }, duration);
  }
  
  // التحكم بالسلة الجانبية
  const cartSidebar = document.getElementById("cartSidebar");
  const cartOverlay = document.getElementById("cartOverlay");
  const cartIconBtn = document.getElementById("cartIconBtn");
  const closeCartBtn = document.getElementById("closeCartBtn");
  
  function openCartSidebar() {
    cartSidebar.classList.add("open");
    cartOverlay.classList.add("open");
  }
  
  function closeCartSidebar() {
    cartSidebar.classList.remove("open");
    cartOverlay.classList.remove("open");
  }
  
  cartIconBtn.addEventListener("click", openCartSidebar);
  closeCartBtn.addEventListener("click", closeCartSidebar);
  cartOverlay.addEventListener("click", closeCartSidebar);
  
  // نموذج الخروج (مودال الشراء)
  const checkoutModal = document.getElementById("checkoutModal");
  const checkoutBtn = document.getElementById("checkoutBtn");
  const confirmOrderBtn = document.getElementById("confirmOrderBtn");
  const closeModalBtn = document.getElementById("closeModalBtn");
  
  function openCheckoutModal() {
    if (cart.length === 0) {
      showToast("⚠️ لا يمكن إتمام الشراء والسلة فارغة!", 2000);
      return;
    }
    checkoutModal.classList.add("open");
  }
  
  function closeCheckoutModal() {
    checkoutModal.classList.remove("open");
  }
  
  checkoutBtn.addEventListener("click", openCheckoutModal);
  closeModalBtn.addEventListener("click", closeCheckoutModal);
  
  // تأكيد الطلب (محاكاة)
  confirmOrderBtn.addEventListener("click", () => {
    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();
    if (name === "" || phone === "") {
      showToast("❌ الرجاء إدخال الاسم ورقم الهاتف", 1500);
      return;
    }
    const { totalItems, totalPrice } = getCartTotals();
    // عرض رسالة نجاح ومحاكاة إرسال الطلب
    showToast(`🎉 شكراً ${name}! تم استلام طلبك بقيمة ${totalPrice.toFixed(2)} ج.م وسيتم التواصل معك`, 4000);
    // تفريغ السلة
    cart = [];
    saveCartToStorage();
    updateCartUI();
    closeCheckoutModal();
    closeCartSidebar();
    // مسح الحقول
    document.getElementById("customerName").value = "";
    document.getElementById("customerPhone").value = "";
    document.getElementById("customerEmail").value = "";
    // رسالة إضافية
    setTimeout(() => {
      showToast("📦 سوف يتم تأكيد الطلب خلال دقائق", 2000);
    }, 500);
  });
  
  // عرض المنتجات على الشبكة
  function renderProducts() {
    const grid = document.getElementById("productsGrid");
    if (!grid) return;
    let productsHTML = "";
    productsData.forEach(product => {
      productsHTML += `
        <div class="product-card">
          <div class="product-img">
            <span style="font-size: 4rem;">${product.icon}</span>
          </div>
          <div class="product-info">
            <div class="product-title">${product.name}</div>
            <div class="product-price">${product.price} <small>ج.م</small></div>
            <button class="add-to-cart" data-id="${product.id}">
              <i class="fas fa-cart-plus"></i> أضف للسلة
            </button>
          </div>
        </div>
      `;
    });
    grid.innerHTML = productsHTML;
    
    // attach events for add to cart buttons
    document.querySelectorAll('.add-to-cart').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        addToCart(id);
      });
    });
  }
  
  // أغلق المودال عند الضغط خارج المحتوى 
  window.addEventListener("click", (e) => {
    if (e.target === checkoutModal) {
      closeCheckoutModal();
    }
  });
  
  // بدء التطبيق
  function init() {
    renderProducts();
    loadCartFromStorage();
  }
  
  init();
</script>
</body>
</html>
